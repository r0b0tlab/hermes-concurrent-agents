# Control-plane preset for multi-Spark cluster (vLLM per node default)
# Prerequisite: NVIDIA connect-two-sparks / connect-three-sparks / multi-sparks-through-switch
# + discover-sparks passwordless SSH, same username on all nodes.

preset = "gb10-cluster-vllm"

[fleet]
name = "spark-cluster"
board = "hca"
role = "control"
tmux_socket = "hca-cluster"
warm_slots = true
dispatch_interval_seconds = 5.0

[backend]
engine = "vllm"
endpoint = "http://127.0.0.1:8000/v1"
model = ""
local_only = true

[capacity]
max_top_level_runs = 3
max_total_sequences = 4.0
max_wave_size = 4
launch_stagger_seconds = 2.0

[cluster]
transport = "ssh"
require_same_username = true
ssh_batch_mode = true
ssh_control_master = true
probe_interval_seconds = 15.0
placement_policy = "colocate-infer"
# nodes are added via: hca cluster nodes add hosta hostb

[profiles.slots]
orchestrator = 1
general = 2
coder = 2
research = 2
qa = 1
creative = 1

[delegation]
max_concurrent_children = 2
