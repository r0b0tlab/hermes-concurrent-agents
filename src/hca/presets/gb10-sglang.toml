# Single DGX Spark / GB10 — SGLang first-class
# https://github.com/NVIDIA/dgx-spark-playbooks/tree/main/nvidia/sglang
# Default NVIDIA playbook port is 30000

preset = "gb10-sglang"

[fleet]
name = "gb10"
board = "hca"
role = "single"
tmux_socket = "hca-gb10"
warm_slots = true
dispatch_interval_seconds = 5.0

[backend]
engine = "sglang"
endpoint = "http://127.0.0.1:30000/v1"
model = ""
api_mode = "openai"
local_only = true

[capacity]
max_top_level_runs = 3
max_total_sequences = 4.0
memory_high = 0.90
memory_low = 0.75
launch_stagger_seconds = 1.5
max_wave_size = 4

[profiles.slots]
orchestrator = 1
general = 2
coder = 2
research = 2
qa = 1
creative = 1

[delegation]
max_concurrent_children = 2

[approvals]
yolo = false
