# Reviewed team: review is mandatory (code/publish/destructive work). The
# final-result task depends on a mandatory rework/no-op gate.
name = "reviewed"
description = "Planner + worker pool + reviewer with review always required."
review_policy = "always"
max_workers = 3

[roles.planner]
kind = "planner"
count = 1

[roles.worker]
kind = "worker"
count = 2

[roles.reviewer]
kind = "reviewer"
count = 1
