# Template config.yaml for worker profiles
# Applied by setup.sh to each profile.
#
# Points to local vLLM server (Nemotron-NVFP4, Marlin backend).
# Change base_url if using a different inference backend.

model:
  default: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
  provider: local-vllm
  base_url: http://127.0.0.1:8000/v1
  api_key: local

providers:
  local-vllm:
    base_url: http://127.0.0.1:8000/v1
    api_key: local

agent:
  max_turns: 500
  gateway_timeout: 7200
  api_max_retries: 5
  tool_use_enforcement: auto

checkpoints:
  enabled: true
  max_snapshots: 20

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

terminal:
  backend: local
  timeout: 300
  cwd: .
