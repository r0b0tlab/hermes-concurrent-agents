# vLLM with Marlin NVFP4 backend for GB10/DGX Spark (SM121)
# Tested on GB10 with vLLM 0.20.1 + Marlin backend
#
# CUTLASS FP4 is BROKEN on SM121 (lacks tcgen05 tensor cores).
# Marlin dequantizes FP4->BF16 on-the-fly: 50 tok/s, zero errors.
#
# Usage: docker compose up -d
# Verify: curl http://localhost:8000/v1/models

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-concurrent
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_NVFP4_GEMM_BACKEND=marlin
      - VLLM_TEST_FORCE_FP8_MARLIN=1
    command: >
      --model nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
      --served-model-name nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --enforce-eager
      --gpu-memory-utilization 0.70
      --max-model-len 65536
      --max-num-seqs 16
      --kv-cache-dtype fp8
      --moe-backend marlin
      --tool-call-parser qwen3_coder
      --enable-auto-tool-choice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
