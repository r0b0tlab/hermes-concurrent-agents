# SGLang OpenAI-compatible backend for concurrent Hermes agents (GB10 / DGX Spark)
#
# Aligned with the NVIDIA DGX Spark SGLang playbook (CUDA 13 image, flashinfer
# attention backend) and Hermes Agent local-endpoint requirements:
#   https://github.com/NVIDIA/dgx-spark-playbooks/tree/main/nvidia/sglang
#   https://hermes-agent.nousresearch.com/docs/integrations/providers
#
# Required:
#   export HCA_MODEL_PATH=/path/or/hf-id/of/your/model
#   export HCA_MODEL_NAME=served-model-name-visible-in-/v1/models
# Optional:
#   export HCA_SGLANG_IMAGE=lmsysorg/sglang:latest-cu130
#   export HCA_MAX_MODEL_LEN=65536          # Hermes requires >=64k context for tool use
#   export HCA_MEM_FRACTION_STATIC=0.75
#   export HCA_TOOL_CALL_PARSER=qwen        # model-specific; required for Hermes tool calling
#   export HCA_EXTRA_SGLANG_ARGS="--quantization modelopt_fp4"  # required for NVFP4 models
#
# After starting, verify:
#   curl http://localhost:30000/v1/models
#   hca doctor --tools

services:
  sglang:
    image: ${HCA_SGLANG_IMAGE:-lmsysorg/sglang:latest-cu130}
    container_name: ${HCA_CONTAINER_NAME:-sglang-concurrent}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "${HCA_PORT:-30000}:30000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      python3 -m sglang.launch_server
      --model-path ${HCA_MODEL_PATH:?set HCA_MODEL_PATH}
      --served-model-name ${HCA_MODEL_NAME:?set HCA_MODEL_NAME}
      --host 0.0.0.0
      --port 30000
      --trust-remote-code
      --attention-backend flashinfer
      --mem-fraction-static ${HCA_MEM_FRACTION_STATIC:-0.75}
      --context-length ${HCA_MAX_MODEL_LEN:-65536}
      --tool-call-parser ${HCA_TOOL_CALL_PARSER:-qwen}
      --enable-metrics
      ${HCA_EXTRA_SGLANG_ARGS:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
