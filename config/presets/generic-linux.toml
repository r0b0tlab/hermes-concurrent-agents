# Generic Linux secondary host (non-Spark)

preset = "generic-linux"

[fleet]
name = "linux"
board = "hca"
role = "single"
tmux_socket = "hca-linux"
warm_slots = true

[backend]
engine = "openai_compat"
endpoint = "http://127.0.0.1:8000/v1"
model = ""
local_only = true

[capacity]
max_top_level_runs = 2
max_total_sequences = 3.0
launch_stagger_seconds = 1.0
max_wave_size = 2

[profiles.slots]
orchestrator = 1
coder = 1
research = 1
qa = 1
creative = 0
