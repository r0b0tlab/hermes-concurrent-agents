name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Product target is DGX Spark / GB10 (Linux). GitHub-hosted runners only gate
# portable unit tests + CLI smoke. They are not a performance or GB10 substitute.
# On-box validation: hca doctor / hca bench / fleet smoke on the Spark itself.

jobs:
  test:
    name: Linux unit + smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q tests/unit
      - name: Contract tests (skip if hermes absent)
        run: pytest -q tests/contract || true
      - name: CLI smoke
        run: |
          hca version
          hca presets
          hca plan --preset generic-linux --json
          hca bench --dry-run --preset gb10-vllm --model dummy --json
          hca init --preset generic-linux --model dummy --state-dir /tmp/hca-ci --json
          hca up --no-dispatch --preset generic-linux --model dummy --state-dir /tmp/hca-ci --json
          hca ps --preset generic-linux --state-dir /tmp/hca-ci
          hca drain --state-dir /tmp/hca-ci
          hca down --state-dir /tmp/hca-ci
          tmux -L hca-linux kill-server || true
